<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARBMAXX · Private</title>
<style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --deep:#0284c7; --txt:#f8fafc; --muted:#94a3b8; --line:#334155; --danger:#f87171; }
    * { box-sizing:border-box; }
    body {
        margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        background:radial-gradient(900px 500px at 80% -10%, rgba(2,132,199,.15), transparent 60%), var(--bg);
        color:var(--txt); padding:20px;
    }
    .lock {
        background:var(--card); border:1px solid var(--line); border-radius:18px;
        padding:36px 30px; width:100%; max-width:380px; text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,.4);
    }
    .lock.shake { animation:sh .35s; }
    @keyframes sh { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .ico { font-size:40px; }
    h1 { margin:12px 0 4px; font-size:20px; letter-spacing:.5px; }
    p.sub { margin:0 0 22px; color:var(--muted); font-size:13px; }
    input[type=password] {
        width:100%; padding:13px 14px; background:var(--bg); border:1px solid var(--line);
        border-radius:10px; color:var(--txt); font-size:16px; text-align:center; letter-spacing:2px;
    }
    input[type=password]:focus { outline:none; border-color:var(--accent); }
    button {
        width:100%; margin-top:14px; padding:13px; border-radius:10px; border:1px solid var(--accent);
        background:var(--deep); color:#fff; font-size:15px; font-weight:700; cursor:pointer; transition:.15s;
    }
    button:hover { background:var(--accent); color:#062338; }
    button:disabled { opacity:.5; cursor:wait; }
    .remember { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px; font-size:13px; color:var(--muted); cursor:pointer; user-select:none; }
    .remember input { accent-color:var(--accent); }
    .msg { min-height:18px; margin-top:12px; font-size:13px; font-weight:600; color:var(--muted); }
    .msg.err { color:var(--danger); }
</style>
</head>
<body>
<div class="lock" id="lockCard">
    <div class="ico">🔒</div>
    <h1>Private Area</h1>
    <p class="sub">This section is code-protected.</p>
    <input type="password" id="codeIn" placeholder="access code" autocomplete="off">
    <button id="goBtn">Unlock</button>
    <label class="remember"><input type="checkbox" id="rememberChk" checked> Remember this device</label>
    <div class="msg" id="msg"></div>
</div>

function boot(html){ html = patchCategoryHub(patchCycleHub(patchProtocolHub(html))); document.open(); document.write(html); document.close(); }

async function unlock(){
    var code = document.getElementById('codeIn').value;
    if(!code){ setMsg('Enter the code', true); return; }
    var btn = document.getElementById('goBtn');
    btn.disabled = true; setMsg('Unlocking…');
    try {
        var kb = await deriveBits(code);
        var html = await tryUnlock(kb);
        if(html){
            var b64 = bytesToB64(kb);
            try {
                if(document.getElementById('rememberChk').checked) localStorage.setItem(KSTORE, b64);
                else sessionStorage.setItem(KSTORE, b64);
            } catch(e){}
            boot(html);
            return;
        }
        setMsg('Wrong code', true);
        var card = document.getElementById('lockCard');
        card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
    } catch(e){ setMsg('Unlock failed — try a modern browser', true); }
    btn.disabled = false;
}

window.addEventListener('load', async function(){
    if(!(window.crypto && crypto.subtle)){ setMsg('This page needs a modern browser (https)', true); return; }
    var saved = null;
    try { saved = localStorage.getItem(KSTORE) || sessionStorage.getItem(KSTORE); } catch(e){}
    if(saved){
        setMsg('Unlocking…');
        var html = await tryUnlock(b64b(saved));
        if(html){ boot(html); return; }
        try { localStorage.removeItem(KSTORE); sessionStorage.removeItem(KSTORE); } catch(e){}
        setMsg('Code changed — enter the new one', true);
    }
    document.getElementById('codeIn').focus();
});
document.getElementById('goBtn').addEventListener('click', unlock);
document.getElementById('codeIn').addEventListener('keydown', function(e){ if(e.key==='Enter') unlock(); });
